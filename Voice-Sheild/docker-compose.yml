version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: voiceshield-backend
    environment:
      - VOICESHIELD_DEVICE=cpu
      - VOICESHIELD_USE_NEURAL=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/reports:/app/backend/reports
      - hf_cache:/models/hf
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: voiceshield-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  hf_cache: {}
